name: Deploy to production (cPanel)

# main-re kerülő commit (merge is) → a build/ feltöltése a dotroll cPanel public_html-be
# rsync-kel (overlay, NEM töröl), majd Cloudflare cache purge.
#
# Egyszeri beállítás — GitHub repo secrets (Settings → Secrets and variables → Actions):
#   SSH_HOST          a cPanel/dotroll SSH host (pl. s12.dotroll.com vagy 185.33.54.7)
#   SSH_PORT          SSH port (cPanel-en gyakran 22)
#   SSH_USER          cPanel felhasználó (egrxtn)
#   SSH_PRIVATE_KEY   a deploy privát kulcs (a hozzá tartozó publikus kulcs cPanel SSH Access-ben engedélyezve)
#   CPANEL_DOCROOT    cél mappa, záró perjellel (/home/egrxtn/public_html/)
#   CF_API_TOKEN      Cloudflare API token (Zone → Cache Purge jog a workflowtech.hu zónára) — opcionális
#   CF_ZONE_ID        a workflowtech.hu Cloudflare Zone ID-ja — opcionális
# Részletek: .github/DEPLOY_SETUP.md

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rsync build/ → cPanel public_html (overlay, nem töröl)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DOCROOT: ${{ secrets.CPANEL_DOCROOT }}
        run: |
          set -euo pipefail
          for v in SSH_HOST SSH_PORT SSH_USER SSH_PRIVATE_KEY DOCROOT; do
            if [ -z "${!v:-}" ]; then
              echo "::error::Hiányzó secret: $v — állítsd be a repo Settings → Secrets alatt."; exit 1
            fi
          done
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "Deploy ${GITHUB_SHA::7} → ${SSH_USER}@${SSH_HOST}:${DOCROOT}"
          # -r rekurzív, -l szimlinkek, -z tömörítés; perm/owner NEM erőltetve (shared hostingon korlátozott)
          rsync -rlvz --no-perms --no-owner --no-group --omit-dir-times \
            -e "ssh -i ~/.ssh/deploy_key -p ${SSH_PORT} -o StrictHostKeyChecking=accept-new" \
            build/ "${SSH_USER}@${SSH_HOST}:${DOCROOT}"

      - name: Cloudflare cache purge
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          set -euo pipefail
          if [ -z "${CF_API_TOKEN:-}" ] || [ -z "${CF_ZONE_ID:-}" ]; then
            echo "Cloudflare secret nincs beállítva — purge kihagyva (a HTML rögtön frissül, a css/js ~4 óráig cache-elt lehet)."
            exit 0
          fi
          resp=$(curl -sS -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "$resp"
          echo "$resp" | grep -q '"success":true' || { echo "::error::Cloudflare purge sikertelen"; exit 1; }
          echo "Cloudflare cache purge-ölve."
