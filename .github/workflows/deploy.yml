name: Deploy to production (cPanel)

# main-re kerülő commit (merge is) → a build/ feltöltése a dotroll cPanel public_html-be
# FTPS-sel (overlay, NEM töröl), majd Cloudflare cache purge.
# (FTPS, mert a fiókon nincs SSH shell/SFTP — az rsync/sftp nem megy.)
#
# Egyszeri beállítás — GitHub repo secrets (Settings → Secrets and variables → Actions):
#   FTP_HOST          FTP host (185.33.54.7)
#   FTP_USER          FTP felhasználó (cPanel fő fiók: egrxtn, VAGY egy dedikált FTP-fiók user@workflowtech.hu)
#   FTP_PASS          az FTP-fiók jelszava (érzékeny!)
#   CPANEL_DOCROOT    cél mappa a login-könyvtárhoz képest (fő fiók: public_html/ ; public_html-re kötött FTP-fióknál: .)
#   CF_API_TOKEN      Cloudflare API token (Zone → Cache Purge jog a workflowtech.hu zónára) — opcionális
#   CF_ZONE_ID        a workflowtech.hu Cloudflare Zone ID-ja — opcionális
# Részletek: .github/DEPLOY_SETUP.md

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy build/ → cPanel public_html (FTPS, overlay, nem töröl)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          DOCROOT: ${{ secrets.CPANEL_DOCROOT }}
        run: |
          set -euo pipefail
          for v in FTP_HOST FTP_USER FTP_PASS DOCROOT; do
            if [ -z "${!v:-}" ]; then
              echo "::error::Hiányzó secret: $v — állítsd be a repo Settings → Secrets alatt."; exit 1
            fi
          done
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          # jelszó/usernév biztonságos beillesztése lftp egyszeres-idézőjeles stringbe
          user_esc=${FTP_USER//\'/\'\\\'\'}
          pass_esc=${FTP_PASS//\'/\'\\\'\'}
          umask 077; SCRIPT="$RUNNER_TEMP/lftp.cmd"
          {
            echo "set ftp:ssl-force true"
            echo "set ftp:ssl-protect-data true"
            echo "set ssl:verify-certificate no"
            echo "set net:max-retries 2"
            echo "set net:timeout 25"
            printf 'open ftp://%s\n' "$FTP_HOST"
            printf "user '%s' '%s'\n" "$user_esc" "$pass_esc"
            # mirror -R = feltöltés; --delete NINCS → overlay, a public_html többi tartalmát nem törli
            printf 'mirror -R --verbose --no-perms --parallel=3 build/ %s\n' "$DOCROOT"
            echo "bye"
          } > "$SCRIPT"
          echo "Deploy ${GITHUB_SHA::7} → ${FTP_HOST}:${DOCROOT} (FTPS)"
          lftp -f "$SCRIPT"; rc=$?
          rm -f "$SCRIPT"
          exit $rc

      - name: Cloudflare cache purge
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          set -euo pipefail
          if [ -z "${CF_API_TOKEN:-}" ] || [ -z "${CF_ZONE_ID:-}" ]; then
            echo "Cloudflare secret nincs beállítva — purge kihagyva (a HTML rögtön frissül, a css/js ~4 óráig cache-elt lehet)."
            exit 0
          fi
          resp=$(curl -sS -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "$resp"
          echo "$resp" | grep -q '"success":true' || { echo "::error::Cloudflare purge sikertelen"; exit 1; }
          echo "Cloudflare cache purge-ölve."
